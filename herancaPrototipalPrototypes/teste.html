<script>
    function Animal(tipo, som) {
        this.tipo = tipo;
        this.som = som;
    }

    const cachorro = new Animal('cachorro', 'au au');

    const { tipo, som } = cachorro;
    console.log(`O Animal é: ${tipo}`);
    console.log(`Seu som é: ${som}`);

</script>
