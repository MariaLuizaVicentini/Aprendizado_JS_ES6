<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destructuring Array</title>
</head>
<body>
</body>
<script>
    const lista = ['malu', 'vicentini', 22, 'campinas'];

    const [ nome, sobrenome, idade, cidade ] = lista;

    console.log(nome);
    console.log(sobrenome);
    console.log(idade);
    console.log(cidade);
</script>
</html>
