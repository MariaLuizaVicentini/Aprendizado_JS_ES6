<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generators Fluxo Ajax</title>
</head>
<body>
</body>
<script>
    function ajax(url) {
        fetch(url)
            .then(data => data.json())
            .then(data => dados.next(data));
    }

    function* ajaxGenerica() {
        console.log('Buscando posts...');
        const posts = yield ajax('https://jsonplaceholder.typicode.com/posts');
        console.log(posts);

        console.log('Buscando dados do github...');
        const github = yield ajax('https://api.github.com/users/MariaLuizaVicentini');
        console.log(github);
    }

    const dados = ajaxGenerica();
    dados.next();
 


</script>
</html>
