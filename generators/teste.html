<script>
    // function nomesGenericos () {
    //     console.log('willian');

    //     console.log('gabriel');
    // }
    // nomesGenericos();

    function* nomesGenericos () {
        console.log('Chamando o primeiro nome');
        yield('willian');
        console.log('Chamando o segundo nome');
        yield('malu');
        console.log('Chamando o terceiro nome');
        yield('gabriel');
    }

    const nomes = nomesGenericos();
    
    console.log(nomes.next());
    console.log(nomes.next());
    console.log(nomes.next());

</script>
