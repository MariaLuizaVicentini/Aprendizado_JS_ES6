<script>

    class Animal {
        constructor(nome) {
            this.nome = nome;
        }

        saudacao() {
            console.log(`Eu sou: ${this.nome}`);
        }
    }

    class Cachorro extends Animal {
        constructor(name, som) {
            super(name);
            this.som = som;
        }

        latido() {
            console.log(`${this.som}, eu sou ${this.nome}`);
        }
    }

    const elefante = new Animal('Dumbo');

    const cachorro = new Cachorro('Bixaninho', 'au au');
